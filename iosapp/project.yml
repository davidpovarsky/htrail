name: HTTrailiOS
options:
  bundleIdPrefix: com.1moby
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
packages:
  HTTrail:
    path: ".."
targets:
  HTTrailiOS:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: ../Resources/Fonts/JetBrainsMono.ttf
        buildPhase: resources
      - path: ../Resources/Localizations
        buildPhase: resources
    dependencies:
      - package: HTTrail
        product: HTTrailCore
      - target: PacketTunnel
        embed: true
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: HTTrail
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "7"
        CFBundleLocalizations:
          - en
          - zh-Hans
          - hi
          - es
          - ar
          - fr
          - bn
          - pt-BR
          - ru
          - ur
          - th
        ITSAppUsesNonExemptEncryption: false
        UIAppFonts:
          - JetBrainsMono.ttf
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # iPad multitasking requires all four orientations or the upload is
        # rejected (STATE_ERROR.VALIDATION_ERROR). iPhone stays upright via the
        # base key above; iPad gets PortraitUpsideDown too.
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSLocalNetworkUsageDescription: "HTTrail uses the local network to capture HTTP/HTTPS traffic on this device and to discover a Mac running HTTrail so this device's traffic can be captured there."
        NSBonjourServices:
          - _httrail._tcp
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    entitlements:
      path: HTTrailiOS.entitlements
      properties:
        com.apple.developer.networking.networkextension:
          - packet-tunnel-provider
        com.apple.security.application-groups:
          - group.com.1moby.httrail
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.1moby.httrail
        DEVELOPMENT_TEAM: D62Y8JVXB9
        CODE_SIGN_STYLE: Automatic
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "7"
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "5.0"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        ENABLE_USER_SCRIPT_SANDBOXING: NO

  PacketTunnel:
    type: app-extension
    platform: iOS
    sources:
      - path: PacketTunnel
    dependencies:
      - package: HTTrail
        product: HTTrailCore
    info:
      path: PacketTunnel/Info.plist
      properties:
        CFBundleDisplayName: HTTrail Capture
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "7"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.networkextension.packet-tunnel
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).PacketTunnelProvider
    entitlements:
      path: PacketTunnel/PacketTunnel.entitlements
      properties:
        com.apple.developer.networking.networkextension:
          - packet-tunnel-provider
        com.apple.security.application-groups:
          - group.com.1moby.httrail
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.1moby.httrail.PacketTunnel
        DEVELOPMENT_TEAM: D62Y8JVXB9
        CODE_SIGN_STYLE: Automatic
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "7"
        SWIFT_VERSION: "5.0"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        ENABLE_USER_SCRIPT_SANDBOXING: NO
